name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Install Luau packages
        run: mise --no-config exec github:pesde-pkg/pesde@0.7.3+registry.0.2.3 --command "pesde install"

      - name: Check formatting
        run: mise --no-config exec github:JohnnyMorganz/StyLua@2.5.2 --command "stylua --check ."

      - name: Run lint
        run: mise --no-config exec github:luau-lang/lute@1.0.0 --command "lute lint ."
